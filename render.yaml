services:
  - type: web
    name: see-vibecoding-app
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/state
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_PIN
        sync: false
      - key: NODE_VERSION
        value: "22"
